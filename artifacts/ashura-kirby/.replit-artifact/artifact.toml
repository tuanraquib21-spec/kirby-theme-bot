kind = "web"
previewPath = "/"
title = "Ashura Discord — Kirby Theme"
version = "1.0.0"
id = "artifacts/ashura-kirby"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24735

[services.development]
run = "pnpm --filter @workspace/ashura-kirby run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ashura-kirby", "run", "build" ]
publicDir = "artifacts/ashura-kirby/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24735"
BASE_PATH = "/"
